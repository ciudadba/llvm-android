name: Build Compilador C++
run-name: Build #${{ github.run_number }}

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android/sdk/platforms/android-34 \
            /usr/local/lib/android/sdk/build-tools/34.0.0 /opt/hostedtoolcache \
            /usr/local/share/boost /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/share/powershell /usr/share/swift /usr/local/julia \
            /opt/az /opt/microsoft /opt/microsoft-powershell /usr/local/sqlpackage
          df -h

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache build de LLVM
        uses: actions/cache@v4
        id: cache-llvm
        with:
          path: llvm-project/build-android
          key: llvm-22.1.8-arm64-v1
          restore-keys: llvm-22.1.8-arm64-

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          local-cache: true

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3 cmake git

      - name: Clone LLVM
        run: |
          if [ ! -d "llvm-project/llvm" ]; then
            if [ -d "llvm-project" ]; then
              # Cache restored build-android dir but no source - clone to temp and merge
              git clone --depth 1 --branch llvmorg-22.1.8 https://github.com/llvm/llvm-project.git llvm-project-src
              cp -a llvm-project-src/. llvm-project/
              rm -rf llvm-project-src
            else
              git clone --depth 1 --branch llvmorg-22.1.8 https://github.com/llvm/llvm-project.git llvm-project
            fi
          fi
          ls llvm-project/clang/include/clang/Frontend/CompilerInstance.h
          ls llvm-project/llvm/include/llvm/ExecutionEngine/Orc/LLJIT.h
          df -h

      - name: Compilar LLVM (Android arm64)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          cd llvm-project
          cmake -S llvm -B build-android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_CROSSCOMPILING=ON \
            -DLLVM_HOST_TRIPLE=x86_64-unknown-linux-gnu \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-android24 \
            -DLLVM_TARGETS_TO_BUILD=AArch64 \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_BUILD_TOOLS=OFF \
            -DCLANG_BUILD_TOOLS=OFF \
            -DLLVM_BUILD_UTILS=ON \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_INCLUDE_UTILS=OFF \
            -DLLVM_INCLUDE_CLANG_TOOLS_EXTRA=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_ENABLE_XML=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBEDIT=OFF \
            -DLLVM_ENABLE_LIBPFM=OFF \
            -DLLVM_ENABLE_OCAMLDOC=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_IDE=OFF \
            -DLLVM_ENABLE_CRASH_OVERRIDES=OFF \
            -DLLVM_USE_NEWPM=ON \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_BUILD_SHARED_LIBS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCLANG_ENABLE_STATIC_ANALYZER=OFF \
            -DCLANG_ENABLE_ARCMT=OFF \
            -DCLANG_ENABLE_OBJC_REWRITE=OFF \
            -DCLANG_PLUGIN_SUPPORT=OFF \
            -DLLVM_EXTERNAL_LIT=""
          df -h

      - name: Build libLLVM.so + libclang-cpp.so
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          cd llvm-project
          ninja -C build-android libLLVM.so 2>&1 | tail -50
          echo "--- libLLVM done ---"
          ninja -C build-android libclang-cpp.so 2>&1 | tail -50
          echo "--- libclang-cpp done ---"
          ls -lh build-android/lib/libLLVM*.so* 2>/dev/null
          ls -lh build-android/lib/libclang*.so* 2>/dev/null
          df -h

      - name: Strip y empaquetar LLVM
        run: |
          mkdir -p output/arm64-v8a
          STRIP=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          cp llvm-project/build-android/lib/libLLVM.so output/arm64-v8a/
          cp llvm-project/build-android/lib/libclang-cpp.so output/arm64-v8a/
          $STRIP --strip-all output/arm64-v8a/libLLVM.so
          $STRIP --strip-all output/arm64-v8a/libclang-cpp.so
          ls -lh output/arm64-v8a/

      - name: Build JNI wrapper (native-lib.so)
        run: |
          cd jni
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_static \
            -DLIB_DIR=$GITHUB_WORKSPACE/output/arm64-v8a
          ninja -C build
          ls -lh build/libnative.so
          $ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-all build/libnative.so
          cp build/libnative.so $GITHUB_WORKSPACE/output/arm64-v8a/
          ls -lh $GITHUB_WORKSPACE/output/arm64-v8a/

      - name: Subir .so files
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs-arm64
          path: output/arm64-v8a/*
          retention-days: 90
